name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project WoodlandsFishing.xcodeproj \
            -scheme WoodlandsFishing \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty
        # NOTE: no '|| true' here — that previously masked all build failures
        # and let compile errors pass as green. set -o pipefail makes the step
        # fail if xcodebuild fails even through the xcpretty pipe.
